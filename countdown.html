<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patch 5 Countdown</title>
    <style>
        :root {
            --accent-color: #b266ff;
            --bg-main: #050505;
            --shake-amt: 0px;
            --tilt-angle: 0deg;
            --ghost-alpha: 0;
            --crack-alpha: 0;
            --pulse-scale: 1;
            --glow-size: 15px;
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg-main);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 1.5s ease;
        }

        #bg-ghost {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 45vw;
            font-weight: 900;
            z-index: 0;
            -webkit-text-stroke: 2px var(--accent-color);
            color: transparent;
            opacity: var(--ghost-alpha);
            transition: opacity 0.4s;
            pointer-events: none;
            font-variant-numeric: tabular-nums;
        }

        #crack-svg {
            position: fixed;
            inset: 0;
            z-index: 2;
            opacity: var(--crack-alpha);
            pointer-events: none;
        }

        .crack-line {
            stroke: white;
            stroke-width: 2.5;
            fill: none;
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .crack-line.active {
            stroke-dashoffset: 0;
        }

        .content-layer {
            z-index: 10;
            text-align: center;
        }

        #main-timer {
            font-size: clamp(2.5rem, 15vw, 9rem);
            font-weight: 900;
            color: var(--accent-color);
            font-variant-numeric: tabular-nums;
            transform: rotate(var(--tilt-angle)) scale(var(--pulse-scale));
            filter: drop-shadow(0 0 var(--glow-size) var(--accent-color));
            animation: jitter 0.1s infinite;
            display: flex;
            gap: 0;
        }

        #main-timer span {
            display: inline-block;
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .label {
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .btn {
            display: inline-block;
            margin-top: 4rem;
            padding: 14px 40px;
            border: 1px solid var(--accent-color);
            border-radius: 50px;
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            transition: opacity 0.5s;
        }

        .hidden { 
            opacity: 0; 
            pointer-events: none; 
        }

        @keyframes jitter {
            0% { transform: rotate(var(--tilt-angle)) scale(var(--pulse-scale)) translate(var(--shake-amt), calc(var(--shake-amt) * -1)); }
            50% { transform: rotate(var(--tilt-angle)) scale(var(--pulse-scale)) translate(calc(var(--shake-amt) * -1), var(--shake-amt)); }
            100% { transform: rotate(var(--tilt-angle)) scale(var(--pulse-scale)) translate(var(--shake-amt), 0); }
        }

        #flash-screen {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
        }

        .live-ui #main-timer { 
            color: white; 
            filter: drop-shadow(0 0 40px white);
            gap: 10px;
        }

        .cramped-text span {
            letter-spacing: -1em;
            opacity: 0;
            transform: scale(0.5);
        }
    </style>
</head>
<body>

    <div id="flash-screen"></div>
    <div id="bg-ghost">00</div>
    
    <svg id="crack-svg" viewBox="0 0 1000 1000" preserveAspectRatio="none">
        <path class="crack-line" id="c1" d="M-50,200 L150,250 L100,400 L450,1050"/>
        <path class="crack-line" id="c2" d="M1050,100 L850,300 L700,450 L550,1050"/>
        <path class="crack-line" id="c3" d="M500,-50 L480,150 L600,250 L750,1050"/>
        <path class="crack-line" id="c4" d="M200,-50 L250,200 L100,350 L-50,750"/>
        <path class="crack-line" id="c5" d="M-50,500 L300,550 L700,600 L1050,550"/>
        <path class="crack-line" id="c6" d="M1050,800 L800,750 L500,800 L450,1050"/>
        <path class="crack-line" id="c7" d="M-50,850 L350,700 L500,900 L650,1050"/>
        <path class="crack-line" id="c8" d="M850,-50 L750,200 L600,600 L750,1050"/>
        <path class="crack-line" id="c9" d="M350,-50 L200,250 L450,400 L-50,600"/>
        <path class="crack-line" id="c10" d="M750,-50 L800,300 L650,500 L1050,700"/>
        <path class="crack-line" id="c11" d="M-50,100 L250,150 L150,300 L450,-50"/>
        <path class="crack-line" id="c12" d="M1050,500 L800,550 L700,850 L450,1050"/>
    </svg>

    <div class="content-layer">
        <div class="label" id="status-label">Patch 5 coming in:</div>
        <div id="main-timer">00:00:00:00</div>
        <a href="index.html" class="btn" id="home-link">Back to Home</a>
    </div>

    <script>
        const targetTime = Date.UTC(2026, 3, 18, 16, 0, 0);
        
        const dom = {
            body: document.body,
            timer: document.getElementById('main-timer'),
            ghost: document.getElementById('bg-ghost'),
            flash: document.getElementById('flash-screen'),
            link: document.getElementById('home-link'),
            label: document.getElementById('status-label')
        };

        let active = true;

        function update() {
            if (!active) return;

            const now = Date.now();
            const diff = targetTime - now;

            if (diff <= 0) {
                initLaunch();
                return;
            }

            const days = Math.floor(diff / 86400000);
            const hrs = Math.floor((diff % 86400000) / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            const secs = Math.floor((diff % 60000) / 1000);
            const totalSecs = Math.floor(diff / 1000);

            if (totalSecs < 216000) {
                const p = 1 - (diff / 216000000);
                const r = Math.floor(178 + (77 * p));
                const g = Math.floor(102 * (1 - p));
                const b = Math.floor(255 * (1 - p));
                dom.body.style.setProperty('--accent-color', `rgb(${r}, ${g}, ${b})`);
            }

            if (totalSecs < 3600) {
                dom.body.style.setProperty('--crack-alpha', 1);
                const count = Math.floor((3600 - totalSecs) / 300) + 1;
                for (let i = 1; i <= 12; i++) {
                    if (i <= count) document.getElementById(`c${i}`).classList.add('active');
                }
            }

            if (totalSecs <= 60) {
                dom.body.style.setProperty('--ghost-alpha', (secs % 2 === 0) ? 0.25 : 0.1);
                dom.ghost.innerText = secs.toString().padStart(2, '0');
            }

            let shake = 0;
            if (totalSecs < 129600) shake = 1.5;
            if (totalSecs < 300) { 
                shake = 4; 
                dom.link.classList.add('hidden'); 
            }
            if (totalSecs < 10) {
                shake = 8;
                dom.body.style.setProperty('--tilt-angle', `${Math.sin(now / 60) * 4}deg`);
                dom.body.style.setProperty('--glow-size', '30px');
            }

            dom.body.style.setProperty('--shake-amt', `${shake}px`);
            dom.body.style.setProperty('--pulse-scale', 1 + (Math.sin(now / 400) * 0.03));
            
            dom.timer.innerText = [days, hrs, mins, secs]
                .map(v => v.toString().padStart(2, '0'))
                .join(':');
        }

        function initLaunch() {
            active = false;
            dom.body.style.setProperty('--shake-amt', '40px');
            document.querySelectorAll('.crack-line').forEach(c => c.classList.add('active'));

            setTimeout(() => {
                dom.flash.style.opacity = "1";
                
                setTimeout(() => {
                    const s = dom.body.style;
                    s.setProperty('--shake-amt', '0px');
                    s.setProperty('--tilt-angle', '0deg');
                    s.setProperty('--crack-alpha', '0');
                    s.setProperty('--ghost-alpha', '0');
                    s.setProperty('--glow-size', '0px');
                    
                    dom.label.style.display = "none";
                    dom.body.style.background = "radial-gradient(circle, #500, #000)";
                    
                    dom.timer.innerHTML = "";
                    dom.timer.classList.add("cramped-text");
                    
                    [..."PATCH 5 IS LIVE"].forEach(c => {
                        const span = document.createElement("span");
                        span.innerText = c === " " ? "\u00A0" : c;
                        dom.timer.appendChild(span);
                    });

                    setTimeout(() => {
                        dom.body.classList.add("live-ui");
                        dom.timer.classList.remove("cramped-text");
                    }, 50);

                    dom.flash.style.transition = "opacity 2s ease";
                    dom.flash.style.opacity = "0";

                    setTimeout(() => dom.link.classList.remove("hidden"), 1500);
                }, 200);
            }, 800);
        }

        setInterval(update, 50);
        update();
    </script>
</body>
</html>
