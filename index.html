<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nullscape Portal</title>
<style>
:root{
  --accent:#66b2ff;
  --accent-dark:#337aff;
  --glow:rgba(77, 155, 255, 0.4);
  --bg:rgb(15, 20, 26);
  --box-bg:rgb(22, 28, 35);
}

body{
  margin:0;
  min-height:100vh;
  background:var(--bg);
  color:white;
  font-family:'Segoe UI',Arial,sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

h1{
  text-align:center;
  margin:0 0 40px 0;
  font-size:clamp(32px, 8vw, 64px);
  color:var(--accent);
  text-shadow:0 0 15px var(--accent);
  text-transform: uppercase;
  letter-spacing: 4px;
}

.portal-container {
  display: flex;
  flex-direction: column;
  gap: 25px;
  width: 90%;
  max-width: 500px;
}

.portal-box {
  background: var(--box-bg);
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 0 25px var(--glow);
  border: 1px solid var(--accent);
  text-decoration: none;
  color: white;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.portal-box:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 40px var(--accent);
}

.icon {
  width: 60px;
  height: 60px;
  margin-bottom: 15px;
  object-fit: contain;
}

.title {
  font-size: 24px;
  font-weight: bold;
  color: var(--accent); 
  margin-bottom: 8px;
}

.description {
  font-size: 14px;
  color: #aaa;
  line-height: 1.4;
}

.watermark {
    position: fixed;
    bottom: 20px;
    color: rgba(255,255,255,0.4);
    font-weight: bold;
    letter-spacing: 2px;
    text-shadow: 0 0 10px var(--accent);
    font-style: italic;
    font-size: 14px;
}
</style>
</head>
<body>

<h1>Gome Page</h1>

<div class="portal-container">
    <a href="prices.html" class="portal-box">
        <img src="assets/Trap-Card.png" class="icon" alt="Calculator">
        <div class="title">Calculator</div>
        <div class="description">Calculate upgrade costs or trap card enemy spawns.</div>
    </a>

    <a href="stats.html" class="portal-box">
        <img src="assets/Adrenaline.png" class="icon" alt="Stats">
        <div class="title">Stats</div>
        <div class="description">(WIP)</div>
    </a>

    <a href="countdown.html" class="portal-box">
        <div class="title" style="margin: 0;">Patch 5 Countdown</div>
    </a>
</div>

<div class="watermark">Made by alireza1303</div>

</body>
</html>
