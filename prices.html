<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nullscape Calculator</title>
    <link rel="icon" type="image/svg+xml" href="https://www.gstatic.com/lamda/images/favicon_v1_150160d13988650c76.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c285ff;
            --primary-glow: rgba(194, 133, 255, 0.5);
            --extreme: #ffab66;
            --extreme-glow: rgba(255, 171, 102, 0.5);
            --bg-dark: #0f0f12;
            --card-bg: #1a1a1f; 
            --card-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-dim: #b8b8b8;
            --text-v-dim: #757575;
            --accent-red: #ff7070;
        }

        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        #particles-js {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e1e35 0%, #0f0f12 100%);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: 0.8s;
        }

        .loader-ring {
            width: 60px; height: 60px;
            border: 3px solid var(--card-border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .container {
            max-width: 1850px; 
            margin: 0 auto;
            padding: 20px;
            opacity: 0;
            transform-origin: top center;
            transition: 1s cubic-bezier(0.2, 1, 0.2, 1);
        }
        .container.loaded { opacity: 1; transform: scale(0.95); animation: fadeInUp 0.8s ease-out forwards; }

        header { text-align: center; margin-bottom: 25px; }
        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 380px; 
            gap: 25px;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.02);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--primary);
            margin-bottom: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .settings-grid { display: flex; flex-direction: column; gap: 20px; }
        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 600;
        }

        input[type="number"] {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 2px solid var(--card-border);
            border-radius: 16px;
            padding: 12px;
            color: white;
            font-size: 1.4rem;
            font-weight: 800;
            text-align: center;
            transition: 0.3s;
        }
        input[type="number"]:focus { border-color: var(--primary); outline: none; background: rgba(0,0,0,0.6); box-shadow: 0 0 15px var(--primary-glow); }

        .mode-selector { display: grid; gap: 8px; }
        .mode-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--card-border);
            padding: 12px;
            border-radius: 14px;
            color: var(--text-dim);
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            font-size: 0.9rem;
        }
        
        .mode-btn[data-mode="solo"].active { background: var(--primary); color: white; box-shadow: 0 0 25px var(--primary-glow); }
        .mode-btn[data-mode="normal"].active { background: var(--primary); color: white; box-shadow: 0 0 25px var(--primary-glow); }
        .mode-btn[data-mode="hard"].active { 
            background: var(--extreme); 
            color: white; 
            border-color: var(--extreme);
            box-shadow: 0 0 25px var(--extreme-glow);
            transform: scale(1.02);
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); 
            gap: 12px;
        }

        .upgrade-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 20px;
            background: rgba(255,255,255,0.04);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .upgrade-item:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); border-color: rgba(255,255,255,0.1); }
        .upgrade-item.active { background: rgba(194, 133, 255, 0.15); border-color: var(--primary); box-shadow: 0 0 15px rgba(194, 133, 255, 0.05); }
        
        body.mode-hard .upgrade-item.active { background: rgba(255, 171, 102, 0.15); border-color: var(--extreme); }

        /* ICON FIXES HERE */
        .icon-wrapper {
            width: 48px; height: 48px;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            padding: 6px;
            flex-shrink: 0;
            overflow: hidden; /* Prevents overflow */
        }

        .icon-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Keeps ratio while fitting */
            display: block;
        }

        .info { display: flex; flex-direction: column; gap: 2px; }
        .name { font-weight: 700; font-size: 0.95rem; color: var(--text-main); white-space: nowrap; }
        .price-tag { font-size: 0.8rem; color: var(--text-dim); font-weight: 500; }

        .lv-badge {
            font-size: 0.65rem;
            color: var(--text-v-dim);
            font-weight: 800;
            border: 1px solid var(--card-border);
            padding: 2px 6px;
            border-radius: 6px;
            margin-left: auto;
            background: rgba(0,0,0,0.2);
        }

        .total-display {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .total-val { 
            font-size: 4rem; 
            font-weight: 800; 
            color: var(--primary); 
            display: block; 
            margin: 2px 0;
            transition: all 0.4s ease;
            text-shadow: 0 0 30px var(--primary-glow);
        }

        .formula-text {
            font-size: 0.7rem;
            color: var(--text-v-dim);
            font-weight: 400;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        @media (min-width: 1001px) {
            .mobile-bottom-nav, .mobile-settings-overlay { display: none !important; }
        }

        @media (max-width: 1000px) {
            .container { transform: scale(1) !important; padding: 15px; padding-bottom: 120px; }
            .main-layout { grid-template-columns: 1fr; }
            .sticky-sidebar { display: none; }
            .upgrades-grid { grid-template-columns: 1fr; }
            .mobile-bottom-nav {
                position: fixed; bottom: 0; left: 0; width: 100%; height: 95px;
                background: #1a1a1f; border-top: 1px solid var(--card-border);
                display: flex; align-items: center; justify-content: space-between;
                padding: 0 20px; z-index: 1001;
            }
            .mobile-total-wrap .price { font-size: 2rem; font-weight: 800; color: var(--primary); }
            .mobile-settings-overlay {
                position: fixed; top: 0; left: 0; width: 100%;
                background: #1a1a1f; z-index: 2000; padding: 20px;
                border-bottom: 2px solid var(--primary); transform: translateY(-100%); transition: 0.5s;
            }
            .mobile-settings-overlay.open { transform: translateY(0); }
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .hidden-check { display: none; }
    </style>
</head>
<body class="mode-normal">

<div id="particles-js"></div>

<div class="mobile-settings-overlay" id="mobileDrawer">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <span style="font-weight: 800; color: var(--primary); letter-spacing: 2px;">SETTINGS</span>
        <button onclick="toggleMobileSettings()" style="background: none; border: none; color: white; font-size: 1.5rem;">✕</button>
    </div>
    <div id="mobile-settings-content"></div>
</div>

<div id="loading-screen">
    <div class="loader-ring"></div>
    <p style="margin-top: 20px; letter-spacing: 3px; font-weight: 300;">NULLSCAPE CORE</p>
</div>

<div class="container" id="main-ui">
    <header>
        <h1>Nullscape Calculator</h1>
    </header>

    <div class="main-layout">
        <div class="glass-card">
            <div class="section-title"><span>✦</span> UPGRADES</div>
            <div class="upgrades-grid" id="mainGrid"></div>
        </div>

        <div class="sticky-sidebar" id="sidebar">
            <div class="glass-card" id="pc-settings-box">
                <div class="section-title">SETTINGS</div>
                <div class="settings-grid">
                    <div class="input-group">
                        <label>Player Count</label>
                        <input type="number" class="player-input" min="1" max="20" value="1" onchange="validatePlayers(this)">
                    </div>
                    <div class="input-group">
                        <label>Difficulty</label>
                        <div class="mode-selector">
                            <div class="mode-btn" data-mode="solo" onclick="toggleMode('solo')">Solo</div>
                            <div class="mode-btn active" data-mode="normal" onclick="toggleMode('normal')">Standard</div>
                            <div class="mode-btn" data-mode="hard" onclick="toggleMode('hard')">Extreme</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card" style="margin-top: 20px;">
                <div class="total-display">
                    <span style="font-size: 0.8rem; color: var(--text-dim); font-weight: 700; letter-spacing: 1px;">TOTAL GIFT</span>
                    <span class="total-val" id="result">0</span>
                    <span class="formula-text">ceil(base × √players)*Difficulty</span>
                    <button onclick="clearAll()" style="width: 100%; background: rgba(255, 94, 94, 0.1); border: 1px solid var(--accent-red); color: var(--accent-red); padding: 12px; border-radius: 14px; cursor: pointer; font-weight: 700; transition: 0.3s;">Reset All</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="mobile-bottom-nav">
    <div class="mobile-total-wrap">
        <span style="font-size: 0.7rem; color: var(--text-dim); display: block; font-weight: 700;">TOTAL</span>
        <span class="price" id="mobile-result">0</span>
    </div>
    <div style="display: flex; gap: 10px;">
        <button onclick="clearAll()" style="width:48px; height:48px; border-radius:12px; border:1px solid var(--accent-red); background:rgba(255, 94, 94, 0.1); color:var(--accent-red); font-weight: 800;">↺</button>
        <button class="mobile-toggle-settings" onclick="toggleMobileSettings()" style="background: var(--primary); color: white; padding: 0 20px; border-radius: 12px; height: 48px; border:none; font-weight:800; box-shadow: 0 5px 15px var(--primary-glow);">SETTINGS</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
const upgradesList = [
    {name:"Adrenaline", price:50, icon:"assets/Adrenaline.png", id:"opt-adrenaline", level:3},
    {name:"Business License", price:75, icon:"assets/Business_License.png", level:3},
    {name:"Defuse Kit", price:30, icon:"assets/Defuse_Kit.png", level:3},
    {name:"Paycheck", price:55, icon:"assets/Paycheck.png", level:3},
    {name:"Swiftness Ring", price:80, icon:"assets/Swiftness_Ring.png", level:3},
    {name:"Better Gift Arrow", price:80, icon:"assets/Better_Gift_Arrow.png", level:5},
    {name:"Better Jump Pads", price:50, icon:"assets/Better_Jump_Pads.png", level:5},
    {name:"Double Jump", price:100, icon:"assets/Double_Jump.png", level:5},
    {name:"Enemy ESP", price:100, icon:"assets/Enemy_ESP.png", level:5},
    {name:"Grace Wings", price:250, icon:"assets/Grace_Wings.png", id:"opt-grace", level:5},
    {name:"Grapple Points", price:100, icon:"assets/Grapple_Points.png", level:5},
    {name:"Last Robloxian Standing", price:200, icon:"assets/Last_Robloxian_Standing.png", id:"opt-lrs", level:5},
    {name:"Pocket Bell", price:150, icon:"assets/Pocket_Bell.png", level:5},
    {name:"Tripmine ESP", price:400, icon:"assets/Tripmine_ESP.png", level:5},
    {name:"Advanced Coil", price:600, icon:"assets/Advanced_Gravity_Coil.png", level:8},
    {name:"Ice Skates", price:400, icon:"assets/Ice_Skates.png", id:"opt-iceskates", level:8},
    {name:"Barrier", price:1000, icon:"assets/Subspacial_Barrier.png", id:"opt-barrier", level:10},
    {name:"Helmet", price:600, icon:"assets/Helmet.png", level:10},
    {name:"More Altars", price:600, icon:"assets/More_Altars.png", level:10},
    {name:"Ninja Belt", price:500, icon:"assets/Ninja_Belt.png", id:"opt-ninja", level:13},
    {name:"Gift Magnet", price:2000, icon:"assets/Gift_Magnet.png", level:15},
    {name:"Matrix", price:2500, icon:"assets/Matrix_Tetrahedron.png", level:15},
    {name:"Shield", price:3000, icon:"assets/Shield.png", id:"opt-shield", level:15},
    {name:"Sport Shoes", price:1200, icon:"assets/Sport_Shoes.png", level:15},
    {name:"Real Wings", price:25000, icon:"assets/Real_Wings.png", level:20}
];

const soloPrices = { "opt-grace":200, "opt-barrier":200, "opt-ninja":300, "opt-shield":1000, "opt-iceskates":300 };
let currentMode = 'normal';
let playerCount = 1;

function animateNumber(target, elementId) {
    const el = document.getElementById(elementId);
    if(!el) return;
    const start = parseInt(el.textContent.replace(/,/g, '')) || 0;
    const duration = 400;
    let startTime = null;

    function step(timestamp) {
        if (!startTime) startTime = timestamp;
        const progress = Math.min((timestamp - startTime) / duration, 1);
        const current = Math.floor(progress * (target - start) + start);
        el.textContent = current.toLocaleString();
        if (progress < 1) window.requestAnimationFrame(step);
    }
    window.requestAnimationFrame(step);
}

function renderGrid() {
    const grid = document.getElementById("mainGrid");
    grid.innerHTML = upgradesList.map((item, index) => `
        <div class="upgrade-item" id="${item.id || 'upg-'+index}" onclick="toggleUpgrade(this)">
            <div class="icon-wrapper"><img src="${item.icon}" onerror="this.src='https://via.placeholder.com/50?text=?'"></div>
            <div class="info">
                <span class="name">${item.name}</span>
                <span class="price-tag">Cost: ${item.price}</span>
            </div>
            <span class="lv-badge">Lv${item.level}</span>
            <input type="checkbox" class="hidden-check" data-price="${item.price}">
        </div>
    `).join('');
    document.getElementById('mobile-settings-content').innerHTML = document.getElementById('pc-settings-box').innerHTML;
    handleRules();
}

function toggleMobileSettings() { document.getElementById('mobileDrawer').classList.toggle('open'); }

function validatePlayers(input) {
    playerCount = Math.max(1, Math.min(20, parseInt(input.value) || 1));
    document.querySelectorAll('.player-input').forEach(i => i.value = playerCount);
    handleRules();
}

function toggleUpgrade(el) {
    if(el.style.opacity === "0.3") return;
    const cb = el.querySelector('.hidden-check');
    cb.checked = !cb.checked;
    el.classList.toggle('active', cb.checked);
    calculate();
}

function toggleMode(mode) {
    currentMode = mode;
    document.body.className = `mode-${mode}`;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    document.querySelectorAll('.player-input').forEach(i => {
        i.disabled = mode === 'solo';
        if(mode === 'solo') i.value = 1;
    });
    playerCount = mode === 'solo' ? 1 : playerCount;
    handleRules();
}

function handleRules() {
    document.querySelectorAll(".upgrade-item").forEach((item, index) => {
        const upgrade = upgradesList[index];
        const cb = item.querySelector(".hidden-check");
        let base = (currentMode === 'solo' && soloPrices[upgrade.id]) ? soloPrices[upgrade.id] : upgrade.price;
        let scaled = (playerCount === 1 || currentMode === 'solo') ? base : Math.ceil(base * Math.sqrt(playerCount));
        let final = Math.ceil(scaled * (currentMode === 'hard' ? 1.15 : 1));
        item.querySelector(".price-tag").textContent = `Cost: ${final.toLocaleString()}`;
        let disabled = (upgrade.id === "opt-adrenaline" && currentMode !== 'solo') || (upgrade.id === "opt-lrs" && (currentMode === 'solo' || playerCount < 3));
        item.style.opacity = disabled ? "0.3" : "1";
        item.style.pointerEvents = disabled ? "none" : "auto";
        if(disabled) { cb.checked = false; item.classList.remove('active'); }
    });
    calculate();
}

function calculate() {
    let total = 0;
    document.querySelectorAll(".upgrade-item.active").forEach(item => {
        const id = item.id;
        const cb = item.querySelector(".hidden-check");
        let base = (currentMode === 'solo' && soloPrices[id]) ? soloPrices[id] : Number(cb.dataset.price);
        let scaled = (playerCount === 1 || currentMode === 'solo') ? base : Math.ceil(base * Math.sqrt(playerCount));
        total += Math.ceil(scaled * (currentMode === 'hard' ? 1.15 : 1));
    });
    animateNumber(total, "result");
    animateNumber(total, "mobile-result");
}

function clearAll() {
    document.querySelectorAll(".upgrade-item").forEach(item => {
        item.classList.remove('active');
        item.querySelector('.hidden-check').checked = false;
    });
    calculate();
}

particlesJS("particles-js", {
    "particles": { "number": { "value": 45 }, "color": { "value": "#c285ff" }, "opacity": { "value": 0.3 }, "size": { "value": 2.5 }, "move": { "enable": true, "speed": 0.6 } }
});

window.onload = () => {
    renderGrid();
    setTimeout(() => {
        document.getElementById('loading-screen').style.opacity = '0';
        document.getElementById('main-ui').classList.add('loaded');
        setTimeout(() => document.getElementById('loading-screen').remove(), 800);
    }, 1200);
};
</script>
</body>
</html>
